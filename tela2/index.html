<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.cdnfonts.com/css/sendday" rel="stylesheet" />
    <title>🚀 Calendário 🚀</title>
  </head>
  <body>
    <div class="calendar">
      <h2 class="titulo-calendario">
    <img src="image/calendar.png" alt="Ícone Calendário" class="icone-h2">
    Calendar
    <img src="image/calendar.png" alt="Ícone Calendário" class="icone-h2">
</h2>
      <div class="month">
        <img src="image/flecha.png" alt="Previous" class="prev" />
        <span class="month-year">July 2026</span>
        <img src="image/flecha.png" alt="Next" class="next" />
      </div>
      <div class="grid">
        <div class="day week">Sun</div>
        <div class="day week">Mon</div>
        <div class="day week">Tue</div>
        <div class="day week">Wed</div>
        <div class="day week">Thu</div>
        <div class="day week">Fri</div>
        <div class="day week">Sat</div>


        <!-- julho tem 31 -->
        <div class="next day">28</div>
        <div class="next day">29</div>
        <div class="next day">30</div>
        <div class="day">1</div>
        <div class="day">2</div>
        <div class="day">3</div>
        <div class="weekend day">4</div>
        <div class="weekend day">5</div>
        <div class="day">6</div>
        <div class="day">7</div>
        <div class="day">8</div>
        <div class="day">9</div>
        <div class="day">10</div>
        <div class="weekend day">11</div>
        <div class="weekend day">12</div>
        <div class="day">13</div>
        <div class="day">14</div>
        <div class="day">15</div>
        <div class="day">16</div>
        <div class="day">17</div>
        <div class="weekend day">18</div>
        <div class="weekend day">19</div>
        <div class="day">20</div>
        <div class="day">21</div>
        <div class="day">22</div>
        <div class="day">23</div>
        <div class="day">24</div>
        <div class="weekend day">25</div>
        <div class="weekend day">26</div>
        <div class="day">27</div>
        <div class="day">28</div>
        <div class="day">29</div>
        <div class="day">30</div>
        <div class="day">31</div>
        <div class="next day">1</div>
      </div>
    </div>
  </body>
</html>
