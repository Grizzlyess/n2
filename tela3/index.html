<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚀 Metro 🚀</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app-screen">
        <div class="metro-container">

            <div class="metro-grid">
                
                <div class="tile bg-planetary tile-small">
                    <img src="image/cat1.png" alt="Gato E-mail" class="tile-icon">
                    <span class="tile-title">E-mail</span>
                </div>

                <div class="tile bg-universe tile-small">
                    <img src="image/cat2.png" alt="Gato Telefone" class="tile-icon">
                    <span class="tile-title">Telefone</span>
                </div>

                <div class="tile bg-galaxy tile-wide">
                    <img src="image/cat3.png" alt="Gato Calendário" class="tile-icon">
                    <span class="tile-title">Calendário</span>
                </div>

                <div class="tile bg-venus tile-large">
                    <img src="image/cat4.png" alt="Gato Galeria" class="tile-icon">
                    <span class="tile-title">Galeria</span>
                </div>

                <div class="tile bg-sky tile-small">
                    <img src="image/cat5.png" alt="Gato Câmera" class="tile-icon">
                    <span class="tile-title">Câmera</span>
                </div>

                <div class="tile bg-milky-way tile-small">
                    <img src="image/cat6.png" alt="Gato Música" class="tile-icon">
                    <span class="tile-title">Música</span>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
